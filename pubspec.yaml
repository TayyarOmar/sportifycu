# pubspec.yaml

name: sportify_flutter
description: A Flutter frontend for the Sportify fitness app, implementing authentication,
  gym discovery, and activity features.
version: 1.0.0+1

environment:
  # Dart SDK 3.x is required by freezed and json_serializable generated code
  sdk: ">=3.0.0 <4.0.0"
  # Flutter 3.x or newer
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9

  # Networking (HTTP client)
  dio: ^5.4.0

  # Routing (including deep-linking)
  go_router: ^14.8.1

  # JSON serialization & data classes (runtime)
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # Location services (for gym proximity)
  geolocator: ^11.1.0

  # Local notifications (for reminders, etc.)
  flutter_local_notifications: ^19.2.1

  # Local storage / caching
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Shimmer effect for loading placeholders
  shimmer: ^3.0.0

  # Secure storage for JWT tokens (if you want to store tokens securely)
  flutter_secure_storage: ^9.1.0

  # Common icons
  cupertino_icons: ^1.0.5

  # UsePathUrlStrategy (for web)
  flutter_web_plugins:
    sdk: flutter

  # QR code generation/display
  qr_flutter: ^4.1.0

  # Carousel Slider (for Home screen ads)
  carousel_slider: ^5.0.0

  # Google Maps
  google_maps_flutter: ^2.6.1

  # URL Launcher
  url_launcher: ^6.3.0
  qr_code_scanner: ^1.0.1
  permission_handler: ^12.0.0+1
  image_picker: ^1.1.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation for Freezed & JSON Serializable
  build_runner: ^2.4.6
  freezed: ^2.4.4
  json_serializable: ^6.8.0

  # Linting rules
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    # Include every image under assets/images/
    - assets/images/
